<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 320" role="img" aria-labelledby="title desc">
  <title id="title">Crooked woodland masthead</title>
  <desc id="desc">An original dark ink landscape of crooked trees, distant hills, a pale moon, and field-journal scratches.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#221b17"/>
      <stop offset="0.62" stop-color="#17130f"/>
      <stop offset="1" stop-color="#0b0907"/>
    </linearGradient>
    <radialGradient id="moonGlow">
      <stop offset="0" stop-color="#c8ad82" stop-opacity=".32"/>
      <stop offset=".4" stop-color="#aa8963" stop-opacity=".12"/>
      <stop offset="1" stop-color="#aa8963" stop-opacity="0"/>
    </radialGradient>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".018 .12" numOctaves="2" seed="13" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
    </filter>
    <pattern id="hatch" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(17)">
      <path d="M0 2h22" stroke="#c8ad82" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
  </defs>
